name: Release

on:
  push:
    tags:
      - "v*"

# Least privilege: build jobs only read the repo; the token gains write
# scope only in the publish job that creates the GitHub release.
permissions:
  contents: read

jobs:
  windows:
    name: Windows packages
    runs-on: windows-2022
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Install WinFsp SDK
        shell: pwsh
        run: |
          choco install winfsp -y --no-progress
          $inc = "C:/Program Files (x86)/WinFsp/inc/winfsp/winfsp.h"
          $lib = "C:/Program Files (x86)/WinFsp/lib/winfsp-x64.lib"
          if (-not (Test-Path $inc)) {
            throw "WinFsp SDK header not found at $inc"
          }
          if (-not (Test-Path $lib)) {
            throw "WinFsp SDK import library not found at $lib"
          }

      - name: Locate vcpkg
        shell: pwsh
        run: |
          if (-not $env:VCPKG_ROOT) {
            if ($env:VCPKG_INSTALLATION_ROOT) {
              "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
            } elseif (Test-Path "C:/vcpkg/scripts/buildsystems/vcpkg.cmake") {
              "VCPKG_ROOT=C:/vcpkg" >> $env:GITHUB_ENV
            } else {
              # Pin vcpkg to the manifest's builtin-baseline for reproducible builds.
              git clone https://github.com/microsoft/vcpkg C:/vcpkg
              git -C C:/vcpkg checkout 9224b3bbd8df24999d85720b1d005dd6f969ade0
              "VCPKG_ROOT=C:/vcpkg" >> $env:GITHUB_ENV
            }
          }

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build/windows -G "Visual Studio 17 2022" -A x64
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows
          -DLMPFS_BUILD_TESTS=ON
          -DLMPFS_BUILD_MOUNT_WINFSP=ON

      - name: Build and test
        shell: pwsh
        run: |
          cmake --build build/windows --config Release
          ctest --test-dir build/windows -C Release --output-on-failure

      - name: Package
        shell: pwsh
        run: |
          cmake --build build/windows --config Release --target package
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build/windows/MemNixFS-*-win64.zip dist/
          Copy-Item build/windows/MemNixFS-*-win64.tar.gz dist/

      - name: Smoke packaged Windows ZIP
        shell: pwsh
        run: |
          $zip = Get-ChildItem dist/MemNixFS-*-win64.zip | Select-Object -First 1
          $extract = Join-Path $env:RUNNER_TEMP "memnixfs-win-smoke"
          Remove-Item $extract -Recurse -Force -ErrorAction SilentlyContinue
          Expand-Archive -Force $zip.FullName $extract
          $exe = Get-ChildItem $extract -Recurse -Filter memnixfs.exe | Select-Object -First 1
          if (-not $exe) {
            throw "memnixfs.exe missing from Windows ZIP"
          }
          & $exe.FullName --help *> help.txt
          $code = $LASTEXITCODE
          if ($code -ne 0 -and $code -ne 1) {
            throw "memnixfs.exe --help failed with exit code $code"
          }
          $help = Get-Content help.txt -Raw
          if ($help -notmatch "mount <pt>") {
            throw "Windows ZIP was not built with WinFsp mount support"
          }
          foreach ($dll in @("fmt.dll", "libcrypto-3-x64.dll", "liblzma.dll", "snappy.dll", "memnixfs.dll")) {
            if (-not (Test-Path (Join-Path $exe.DirectoryName $dll))) {
              throw "Expected runtime DLL missing from Windows ZIP: $dll"
            }
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.4.3
        with:
          name: memnixfs-windows
          path: dist/*

  linux:
    name: Linux packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config rpm \
            libfuse3-dev libsnappy-dev liblzma-dev nlohmann-json3-dev \
            libfmt-dev libyara-dev

      - name: Configure
        run: >
          cmake -S . -B build/linux -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DLMPFS_BUILD_TESTS=ON
          -DLMPFS_BUILD_MOUNT_FUSE=ON
          -DLMPFS_BUILD_MOUNT_WINFSP=OFF

      - name: Build and test
        run: |
          cmake --build build/linux
          ctest --test-dir build/linux --output-on-failure

      - name: Package
        run: |
          cmake --build build/linux --target package
          mkdir -p dist
          cp build/linux/MemNixFS-*-Linux.tar.gz dist/
          cp build/linux/MemNixFS-*-Linux.zip dist/
          cp build/linux/MemNixFS-*-Linux.deb dist/
          cp build/linux/MemNixFS-*-Linux.rpm dist/ 2>/dev/null || true

      - name: Smoke packaged Linux artifacts
        run: |
          set -euo pipefail
          extract="$RUNNER_TEMP/memnixfs-linux-smoke"
          rm -rf "$extract"
          mkdir -p "$extract"
          tar -xzf dist/MemNixFS-*-Linux.tar.gz -C "$extract"
          exe="$(find "$extract" -path '*/bin/memnixfs' -type f | head -n 1)"
          test -n "$exe"
          ldd "$exe" | tee ldd.txt
          grep -q 'memnixfs.so => .*/lib/memnixfs.so' ldd.txt
          code=0
          "$exe" --help >help.txt 2>&1 || code=$?
          if [ "$code" != "0" ] && [ "$code" != "1" ]; then
            echo "memnixfs --help failed with exit code $code"
            cat help.txt
            exit "$code"
          fi
          grep -q 'mount <pt>' help.txt
          sudo apt-get install -y ./dist/MemNixFS-*-Linux.deb
          code=0
          /usr/bin/memnixfs --help >/tmp/memnixfs-deb-help.txt 2>&1 || code=$?
          if [ "$code" != "0" ] && [ "$code" != "1" ]; then
            cat /tmp/memnixfs-deb-help.txt
            exit "$code"
          fi
          grep -q 'mount <pt>' /tmp/memnixfs-deb-help.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.4.3
        with:
          name: memnixfs-linux
          path: dist/*

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - windows
      - linux
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.8
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          find artifacts -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's# artifacts/[^/]*/#  #' > SHA256SUMS.txt

      - name: Publish
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.1.0
        with:
          name: MemNixFS ${{ github.ref_name }}
          files: |
            artifacts/**/*
            SHA256SUMS.txt
          # Created as a DRAFT: a maintainer reviews the assets, checksums, and
          # auto-generated notes, then clicks Publish. Prevents a stray or
          # malformed tag from shipping straight to users as "Latest".
          draft: true
          prerelease: false
          make_latest: true
          generate_release_notes: true
