name: Publish docs to Wiki

# Mirrors the docs/ tree into the repository's GitHub Wiki so the wiki always
# reflects docs/. The Wiki must be ENABLED (Settings -> Features -> Wikis) and
# INITIALIZED once (create any page in the web UI) before this can push — until
# then the job no-ops with a hint instead of failing.

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - .github/workflows/wiki.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Mirror docs/ into the wiki
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          wiki="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          if ! git clone --depth 1 "$wiki" wiki 2>/dev/null; then
            echo "::warning title=Wiki not ready::Enable the Wiki (Settings -> Features -> Wikis) and create one page in the web UI, then re-run this workflow."
            exit 0
          fi
          # Replace the wiki's generated content, keeping its .git history.
          find wiki -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R docs/. wiki/
          # The docs index (docs/README.md) becomes the wiki landing page.
          [ -f wiki/README.md ] && mv wiki/README.md wiki/Home.md
          cd wiki
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already up to date."
            exit 0
          fi
          git commit -m "docs: sync wiki from ${{ github.sha }}"
          git push
          echo "Wiki updated from docs/."
